<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <div class="row position-absolute  ">
        <h1 
        style="font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;"
          class="text-white  float-start mt-3 col-10 d-none d-lg-block">
            get your favorite games by free </h1> <br>
            <h1 style="font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;" 
             class="text-danger col-6  d-none d-lg-block">
                with ICONIC </h1>   </div>

<div  class="inputsCard row w-50 p-4  float-end ">
    <div class="row ">
        <h3 class="text-white text-center mb-3">Sign up to continue</h3>
        <div class=" card rounded  col-6 d-inline-block " style="background-color: #0d6efd;" >
            <img  class="card-img-left  " src="assets/facebook.png" height="auto" width="30px">
        <a class="card-title  text-white">sign up with Facebook</a>
        </div>
        <div class="text-center ">
        <a class="text-white ms-3">Or</a>
        </div>
         <div class="card rounded col-6 bg-white d-inline-block">
        <img class="card-img-left" src="assets/gmail.png" height="auto" width="30px">
        <a >sign up with Gmail</a>
        </div>
        </div>


    <div class="mb-3 mt-3 w-75 ">
        <label for="firstname" class="form-label">First name:</label>
        <input type="text" class="form-control rounded-pill" id="firstname" placeholder="Enter your first name" name="email">
      </div>
      <div class="mb-3 w-75 ">
        <label for="lastname" class="form-label">Last name:</label>
        <input type="text" class="form-control rounded-pill" id="lastname" placeholder="Enter your last name" name="email">
      </div>
    <div class="mb-3 w-75">
        <label for="email" class="form-label">Email:</label>
        <input type="email" class="form-control rounded-pill" id="email" placeholder="Enter email" name="email">
      </div>
      <div class="mb-3 w-75">
        <label for="pwd" class="form-label">Password:</label>
        <input type="password" class="form-control rounded-pill" id="pwd" placeholder="Enter password" name="pswd">
      </div>
      <div class="form-check mb-3">
        <label class="form-check-label">
          <input class="form-check-input" type="checkbox" name="remember"> Remember me
        </label>
      </div>
      <a href="index.html" class="text-white mb-3 ms-3">i already have an account!</a>
      <a href="startPage.html" style="text-decoration: none;"><button type="submit" class="btn btn-danger w-25 mb-3">Sign up</button></a>
    </div>
    <div style="padding: 5%;"> 
        <img id="kratos" style="width: 500px;height: auto;" 
        class="d-none d-lg-block mt-3" src="assets/kratos.png">

    </div>

      <style>
        body{
    background-color: #121212;
    padding: 4%;
     overflow: hidden;
}
        .card{
            height: 40px;
            width: 300px;
            margin: 0 auto;

         }
         .card:hover{
             opacity: 0.5;
             transition-duration: 1s;
         }
         input{
             height: 45px;
         }
        a{
            text-decoration: none;
         }
         .inputsCard{
              min-width: 500px;
             height: 600px;
             overflow-y: auto;
             overflow-x: hidden;
             border-radius: 20px;
          }
         label{
             color: white;
         }
        
         ::-webkit-scrollbar {
    width: 10px;
   }
  
   ::-webkit-scrollbar-track {
    background: #3b3b3b;
    border-radius: 8px;
}
  
   ::-webkit-scrollbar-thumb {
    background: #222222;
    border-radius: 8px;
  background-clip: padding-box;  
  }
  img#kratos{
      animation: kAnim 1.5s none;
      }
  @keyframes kAnim{
    0%{margin-left: 10%;
    opacity: 0.2;}
      
    100%{margin-left: 0%;
        opacity: 1;}
  }
    </style>
</body>
</html>
